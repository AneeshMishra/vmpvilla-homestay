services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: homestay
      POSTGRES_PASSWORD: homestay
      POSTGRES_DB: homestaydb
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DB_URL: jdbc:postgresql://db:5432/homestaydb
      DB_USERNAME: homestay
      DB_PASSWORD: homestay
      APP_MODE: testing
    ports:
      - "8080:8080"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  db_data:
