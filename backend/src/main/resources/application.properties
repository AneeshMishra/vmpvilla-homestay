# Server Configuration
server.port=8080
spring.application.name=homestay-booking

# Application Mode (test or production)
app.mode=${APP_MODE:test}

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/homestay_booking}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=${JWT_SECRET:your-256-bit-secret-key-change-in-production-minimum-32-characters}
jwt.expiration=86400000

# Google OAuth Configuration (Optional for test mode)
google.client.id=${GOOGLE_CLIENT_ID:not-configured}
google.client.secret=${GOOGLE_CLIENT_SECRET:not-configured}

# Razorpay Configuration (Optional for test mode)
razorpay.key.id=${RAZORPAY_KEY_ID:not-configured}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:not-configured}

# Email Configuration (Optional for test mode)
spring.mail.host=${EMAIL_HOST:smtp.gmail.com}
spring.mail.port=${EMAIL_PORT:587}
spring.mail.username=${EMAIL_USERNAME:noreply@homestay.com}
spring.mail.password=${EMAIL_PASSWORD:not-configured}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# CORS Configuration
cors.allowed.origins=http://localhost:5173
